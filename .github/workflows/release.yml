name: Build and Release

# Builds the Windows executable and the Inno Setup installer, then publishes the
# setup file as a GitHub Release. The in-app auto-updater reads the latest
# release from the release repository, so this workflow is what drives updates.
#
# Trigger by pushing a version tag, e.g.:  git tag v1.75.2 && git push --tags

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller ServerCreator.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ServerCreator.iss'

      # The built setup is uploaded as a workflow artifact. Download it here and
      # attach it to a new Release in the X1NPAR1/ServerCreator-Release
      # repository — that is the repository the in-app auto-updater checks.
      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ServerCreator-Setup
          path: installer/Output/ServerCreator-Setup-*.exe
          if-no-files-found: error
